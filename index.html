                            if (menuSub.textContent.includes('随机到') && !randomMode) {
                                menuSub.textContent = '选择难度 · AI已就绪';
                                menuSub.className = 'menu-sub';
                            }
                        }, 2500);
                    }
                    if (callback) {
                        setTimeout(callback, 200);
                    }
                    return;
                }
                const currentVal = parseInt(document.querySelector('input[name="color"]:checked').value);
                const nextVal = currentVal === 1 ? 2 : 1;
                radios.forEach(r => {
                    if (parseInt(r.value) === nextVal) r.checked = true;
                });
                const dots = '.'.repeat((count % 6) + 1);
                randDots.textContent = dots;
                playTick();
                count++;
                const speedIdx = Math.min(count, speeds.length - 1);
                const delay = speeds[speedIdx] || 5;
                randomSpinTimer = setTimeout(doTick, delay);
            }
            doTick();
        }

        // ---- AI走棋（包含平局检测） ----
        function aiTurn() {
            if (gameOver || isAIThinking || currentMode !== 'playing') return;
            const aiPlayer = playerColor === 1 ? 2 : 1;
            if (currentPlayer !== aiPlayer) return;
            isAIThinking = true;
            updateUI();

            try {
                const ai = new SelfLearningAI(difficulty);
                const move = ai.getMove(board, history);
                if (!move) {
                    if (isBoardFull()) {
                        gameOver = true;
                        const drawText = '🤝 平局！';
                        showWinner('draw', drawText);
                        isAIThinking = false;
                        updateUI();
                        drawBoard();
                        return;
                    } else {
                        console.warn('AI returned null move but board not full');
                        isAIThinking = false;
                        updateUI();
                        return;
                    }
                }
                const [r, c] = move;
                if (!board[r] || board[r][c] !== 0) {
                    let found = false;
                    for (let rr = 0; rr < SIZE; rr++) {
                        for (let cc = 0; cc < SIZE; cc++) {
                            if (board[rr][cc] === 0) {
                                board[rr][cc] = aiPlayer;
                                history.push({ row: rr, col: cc, player: aiPlayer });
                                hasMoved = true;
                                found = true;
                                if (checkWinGlobal(rr, cc, aiPlayer)) {
                                    gameOver = true;
                                    const wt = aiPlayer === 1 ? '⚫ 黑子胜利！' : '⚪ 白子胜利！';
                                    showWinner(aiPlayer === 1 ? 'black' : 'white', wt);
                                } else if (isBoardFull()) {
                                    gameOver = true;
                                    showWinner('draw', '🤝 平局！');
                                }
                                isAIThinking = false;
                                updateUI();
                                drawBoard();
                                return;
                            }
                        }
                    }
                    if (!found) {
                        if (isBoardFull()) {
                            gameOver = true;
                            showWinner('draw', '🤝 平局！');
                        }
                    }
                    isAIThinking = false;
                    updateUI();
                    return;
                }

                board[r][c] = aiPlayer;
                history.push({ row: r, col: c, player: aiPlayer });
                hasMoved = true;
                drawBoard();
                playPlace();

                if (checkWinGlobal(r, c, aiPlayer)) {
                    gameOver = true;
                    const wt = aiPlayer === 1 ? '⚫ 黑子胜利！' : '⚪ 白子胜利！';
                    showWinner(aiPlayer === 1 ? 'black' : 'white', wt);
                    isAIThinking = false;
                    updateUI();
                    drawBoard();
                    return;
                } else if (isBoardFull()) {
                    gameOver = true;
                    showWinner('draw', '🤝 平局！');
                    isAIThinking = false;
                    updateUI();
                    drawBoard();
                    return;
                }

                currentPlayer = playerColor;
                isAIThinking = false;
                updateUI();
                drawBoard();
            } catch (err) {
                console.error('AI turn error:', err);
                isAIThinking = false;
                updateUI();
            }
        }

        // ---- 玩家点击（包含平局检测） ----
        canvas.addEventListener('click', function(e) {
            if (isWatching || currentMode !== 'playing' || gameOver || isAIThinking || currentPlayer !== playerColor) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width,
                scaleY = canvas.height / rect.height;
            let cx = (e.clientX - rect.left) * scaleX,
                cy = (e.clientY - rect.top) * scaleY;
            let minDist = cellSize * 0.5,
                target = null;
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    let px = padding + c * cellSize,
                        py = padding + r * cellSize;
                    let dist = Math.hypot(cx - px, cy - py);
                    if (dist < minDist) { minDist = dist;
                        target = [r, c]; }
                }
            }
            if (!target) return;
            let [r, c] = target;
            if (!isValid(r, c)) return;

            board[r][c] = playerColor;
            history.push({ row: r, col: c, player: playerColor });
            hasMoved = true;
            drawBoard();
            playPlace();

            if (checkWinGlobal(r, c, playerColor)) {
                gameOver = true;
                const wt = playerColor === 1 ? '⚫ 黑子胜利！' : '⚪ 白子胜利！';
                showWinner(playerColor === 1 ? 'black' : 'white', wt);
                updateUI();
                drawBoard();
                return;
            } else if (isBoardFull()) {
                gameOver = true;
                showWinner('draw', '🤝 平局！');
                updateUI();
                drawBoard();
                return;
            }
            currentPlayer = playerColor === 1 ? 2 : 1;
            updateUI();
            if (currentPlayer !== playerColor && !gameOver) {
                setTimeout(aiTurn, 300);
            }
        });

        // ---- 悔棋 ----
        undoBtn.addEventListener('click', function() {
            if (isWatching || currentMode !== 'playing' || gameOver || isAIThinking || undoRemain <= 0 || !hasMoved ||
                currentPlayer !== playerColor) return;
            for (let i = 0; i < 2; i++) {
                if (history.length === 0) break;
                let last = history.pop();
                board[last.row][last.col] = 0;
            }
            hasMoved = history.length > 0;
            currentPlayer = playerColor;
            gameOver = false;
            undoRemain--;
            updateUI();
            drawBoard();
        });

        // ---- 开始游戏 ----
        function startGame() {
            if (randomSpinActive) {
                menuSub.textContent = '⏳ 随机选择中，请稍候...';
                return;
            }

            if (randomMode) {
                performRandomSelect(() => {
                    const colorRadio = document.querySelector('input[name="color"]:checked');
                    playerColor = parseInt(colorRadio.value);
                    doStartGame();
                });
                return;
            }

            const colorRadio = document.querySelector('input[name="color"]:checked');
            playerColor = parseInt(colorRadio.value);
            doStartGame();
        }

        function doStartGame() {
            winnerShown = false;
            winnerLock = false;
            if (winnerTimer) { clearTimeout(winnerTimer);
                winnerTimer = null; }
            winnerOverlay.classList.remove('show');
            currentMode = 'playing';
            isWatching = false;
            selfPlayRunning = false;
            if (watchInterval) { clearInterval(watchInterval);
                watchInterval = null; }
            updateModeUI('playing');
            initBoard();
            if (playerColor === 2) {
                setTimeout(aiTurn, 500);
            }
        }

        startBtn.addEventListener('click', startGame);

        // ---- 观战AI对战 ----
        async function selfPlayOneGame() {
            const board2 = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
            const history2 = [];
            let player = 1;
            let moves = 0;
            const aiBlack = new SelfLearningAI(3);
            const aiWhite = new SelfLearningAI(3);

            while (moves < 225 && selfPlayRunning) {
                const ai = player === 1 ? aiBlack : aiWhite;
                let move;
                try {
                    move = ai.getMove(board2, history2);
                } catch (e) {
                    console.warn('SelfPlay AI error:', e);
                    let found = false;
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            if (board2[r][c] === 0) {
                                move = [r, c];
                                found = true;
                                break;
                            }
                        }
                        if (found) break;
                    }
                    if (!found) break;
                }
                if (!move) {
                    let full = true;
                    for (let r = 0; r < SIZE; r++) {
                        for (let c = 0; c < SIZE; c++) {
                            if (board2[r][c] === 0) { full = false; break; }
                        }
                        if (!full) break;
                    }
                    if (full) {
                        selfPlayDraw++;
                        selfPlayGames++;
                        updateSelfStatus();
                        return;
                    }
                    break;
                }
                const [r, c] = move;
                if (board2[r][c] !== 0) {
                    let found = false;
                    for (let rr = 0; rr < SIZE; rr++) {
                        for (let cc = 0; cc < SIZE; cc++) {
                            if (board2[rr][cc] === 0) {
                                board2[rr][cc] = player;
                                history2.push({ row: rr, col: cc, player });
                                moves++;
                                found = true;
                                break;
                            }
                        }
                        if (found) break;
                    }
                    if (!found) break;
                } else {
                    board2[r][c] = player;
                    history2.push({ row: r, col: c, player });
                    moves++;
                }

                watchBoard = board2.map(row => [...row]);
                watchHistory = history2.slice();
                watchMoveCount = moves;
                watchWinner = null;

                if (checkWinGlobal(r, c, player)) {
                    const winner = player === 1 ? 'black' : 'white';
                    watchWinner = winner;
                    if (winner === 'black') selfPlayBlack++;
                    else selfPlayWhite++;
                    selfPlayGames++;
                    updateSelfStatus();
                    return;
                }
                let full = true;
                for (let rr = 0; rr < SIZE; rr++) {
                    for (let cc = 0; cc < SIZE; cc++) {
                        if (board2[rr][cc] === 0) { full = false; break; }
                    }
                    if (!full) break;
                }
                if (full) {
                    selfPlayDraw++;
                    selfPlayGames++;
                    updateSelfStatus();
                    return;
                }

                player = 3 - player;
                await new Promise(r => setTimeout(r, 120));
            }
            watchRunning = false;
        }

        function updateSelfStatus() {
            spGames.textContent = selfPlayGames;
            spBlack.textContent = selfPlayBlack;
            spWhite.textContent = selfPlayWhite;
            spDraw.textContent = selfPlayDraw;
            selfStatusText.textContent = `${selfPlayGames}局 | 黑${selfPlayBlack} 白${selfPlayWhite} 平${selfPlayDraw}`;
        }

        function startWatchLoop() {
            if (watchInterval) { clearInterval(watchInterval);
                watchInterval = null; }
            watchInterval = setInterval(() => {
                if (!isWatching) {
                    clearInterval(watchInterval);
                    watchInterval = null;
                    return;
                }
                if (watchBoard && watchBoard.length) {
                    board = watchBoard.map(row => [...row]);
                    history = watchHistory.slice();
                    if (watchWinner) {
                        gameOver = true;
                        const label = watchWinner === 'black' ? '⚫ 黑子胜利！' : '⚪ 白子胜利！';
                        statusEl.innerHTML = '👁️ ' + label;
                    } else {
                        statusEl.innerHTML = `👁️ 第${watchMoveCount}步`;
                    }
                    drawBoard();
                    updateUI();
                }
            }, 250);
        }

        watchBtn.addEventListener('click', function() {
            playDing(660, 0.15);
            if (randomSpinActive) {
                menuSub.textContent = '⏳ 随机选择中，请稍候...';
                return;
            }
            if (randomMode) {
                randomMode = false;
                randomColorBtn.classList.remove('active-mode');
                startBtn.classList.remove('rand-mode-btn');
                menuSub.textContent = '选择难度 · AI已就绪';
                menuSub.className = 'menu-sub';
                randDots.textContent = '';
            }
            currentMode = 'watching';
            isWatching = true;
            updateModeUI('watching');

            watchBoard = [];
            watchHistory = [];
            watchMoveCount = 0;
            watchWinner = null;

            if (!selfPlayRunning) {
                selfPlayRunning = true;
                selfPlayOneGame().then(() => {
                    selfPlayRunning = false;
                    watchRunning = false;
                });
            }
            startWatchLoop();
        });

        exitWatchBtn.addEventListener('click', function() {
            playDing(660, 0.15);
            selfPlayRunning = false;
            isWatching = false;
            currentMode = 'menu';
            updateModeUI('menu');
            watchBoard = [];
            watchHistory = [];
            watchWinner = null;
            if (watchInterval) { clearInterval(watchInterval);
                watchInterval = null; }
        });

        // ---- 初始化 ----
        initBoard();
        updateModeUI('menu');
        window.addEventListener('resize', resizeCanvas);
        document.getElementById('loadingScreen').classList.add('hidden');

        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                if (!randomSpinActive) randomColorBtn.click();
            }
        });

        console.log('✅ 五子棋 · 阴间防守反击版 已加载（平局功能已内置）');
        console.log('📌 棋盘下满时自动判定平局，并显示🤝平局。');
    </script>
</body>
</html>
